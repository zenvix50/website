name: zenviX CI Pipeline

on:
  push:
    branches: [ "**" ]

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests
        run: mvn clean test

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: '**/target/surefire-reports/'

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: zenvix_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: zenvix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Run Integration Tests
        run: mvn verify -Pintegration-tests

  ui-tests:
    name: UI Tests (TestFX)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
        
      - name: Run UI Tests (Headless)
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          mvn test -Pui-tests

  architecture-tests:
    name: Architecture Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Run ArchUnit
        run: mvn test -Dtest=ArchitectureTest

  quality-and-security:
    name: Code Quality & Security Scans
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Checkstyle
        run: mvn checkstyle:check
        
      - name: SpotBugs
        run: mvn spotbugs:check
        
      - name: PMD
        run: mvn pmd:check
        
      - name: Coverage Gate (JaCoCo)
        run: mvn jacoco:check
        
      - name: License Audit
        run: mvn license:check
        
      - name: OWASP Security Scan
        run: mvn dependency-check:check -DfailBuildOnCVSS=7.0
