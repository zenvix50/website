name: zenviX Release Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-build:
    name: Release Build & Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package Installers (jpackage)
        run: mvn package -Prelease

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zenvix-installers-${{ matrix.os }}
          path: |
            **/*.msi
            **/*.dmg
            **/*.deb
            **/*.rpm
            **/*.AppImage
          retention-days: 1

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Download all Installers
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/**/*.msi
            installers/**/*.dmg
            installers/**/*.deb
            installers/**/*.rpm
            installers/**/*.AppImage
          generate_release_notes: true
